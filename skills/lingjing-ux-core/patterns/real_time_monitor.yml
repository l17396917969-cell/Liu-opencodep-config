id: real_time_monitor
name_zh: 实时监控模式
summary_zh: >
  用于高频刷新、预警驱动的运控/供应链看板场景，强调快速发现异常并支持从总览钻取到明细。

goals_zh:
  - "及时发现关键指标异常，并区分正常/预警/严重级别。"
  - "支持从总览视图快速钻取到具体设备/订单/航段明细。"
  - "自动通知相关责任人，并支持多级预警升级逻辑。"

states:
  - id: normal
    label_zh: 正常 (Normal)
    description_zh: "关键指标在安全阈值内。视觉表现：通常采用绿色或默认中性色。"
    trigger_condition: "指标值 < 预设警戒阈值 (Alert Threshold)"

  - id: warning
    label_zh: 预警 (Warning)
    description_zh: "指标接近阈值或轻度异常，需引起关注。视觉表现：橙色/黄色，伴随轻微呼吸动效。"
    trigger_condition: "预设警戒阈值 <= 指标值 < 严重告警阈值 (Critical Threshold)"
    response_rules:
      - 自动推送通知给当前岗位值班人员。
      - 若 15 分钟内未处理，自动重发通知。

  - id: critical
    label_zh: 严重告警 (Critical)
    description_zh: "指标超过阈值或发生重大异常，需立即处理。视觉表现：红色，伴随高频闪烁或全局蒙层提醒。"
    trigger_condition: "指标值 >= 严重告警阈值 (Critical Threshold)"
    response_rules:
      - 立即触发全屏告警弹窗（不可跳过）。
      - 同步向该环节负责人及其上级主管发送紧急短信/系统通知。
      - 启动预设的异常处理工作流 (Exception Handling Workflow)。

key_interactions_zh:
  - "默认开启自动刷新 (Auto-Refresh)，刷新频率可选 (10s/30s/60s)。"
  - "支持手动暂停刷新 (Pause Refresh) 以便进行深度分析。"
  - "点击告警卡片，侧边抽屉展示风险原因、历史趋势及推荐处理方案。"
  - "支持一键定位 (Focus) 到 3D 数字孪生场景中的故障设备锚点。"

applicable_scenarios_zh:
  - "供应链战情室（库存短缺、物流延期、质量波动）。"
  - "智慧工厂设备监控（主轴转速异常、刀具磨损严重）。"
  - "空域流量监控（飞行冲突、空管负荷过载）。"

ui_components:
  - role: metric_card
    lingjing_core_class: "flight-metric-card"
  - role: alert_panel
    lingjing_core_class: "alert-center-panel"
  - role: data_panel
    lingjing_core_class: "data-panel"
    data_properties:
      - data-risk-level: "normal | warning | critical"

performance_constraints:
  refresh_rate: "≤ 60s (Default: 30s)"
  ui_latency: "≤ 200ms (Interaction Response)"
  rendering: "Ensure animations don't exceed 15% CPU overhead in complex dashboards."

notes_zh:
  - "本模式与 UI 技能包的 .state-warning 和 .state-critical 样式一一对应。"
  - "预警升级逻辑应在后端配置，UX 仅定义其在界面上的表现形式。"
