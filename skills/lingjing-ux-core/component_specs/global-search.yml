id: global-search
name_zh: 全局搜索/命令面板交互规范
summary_zh: >
  提供跨页面/模块的搜索或命令输入，支持快捷键唤起、结果分组与键盘导航。

states:
  - id: closed
    label_zh: 关闭
    description_zh: "隐藏，等待快捷键或点击唤起。"
  - id: open
    label_zh: 打开
    description_zh: "可输入查询，显示结果分组。"
  - id: loading
    label_zh: 加载中
    description_zh: "查询中，展示骨架/旋转动效。"
  - id: no_result
    label_zh: 无结果
    description_zh: "展示空态提示与推荐操作。"

interactions:
  - id: summon
    name_zh: 唤起/关闭
    description_zh: "通过快捷键/按钮打开或关闭面板。"
    requirements_zh:
      - "典型快捷键：Ctrl/Cmd + K；Esc 关闭并返回焦点。"
  - id: typeahead
    name_zh: 联想搜索
    description_zh: "输入即搜，结果分组展示。"
    requirements_zh:
      - "结果按类别分组（页面/命令/记录），高亮匹配词。"
  - id: keyboard_nav
    name_zh: 键盘导航
    description_zh: "上下移动选择，回车执行；Tab 切换分组。"
  - id: action_exec
    name_zh: 执行命令
    description_zh: "选中命令或结果后的行为。"
    requirements_zh:
      - "执行前可二次确认高风险操作；执行后给出反馈或跳转。"

accessibility_zh:
  - "焦点环清晰；支持屏幕阅读器朗读选中项与分组标题。"

config_options:
  - id: result_groups
    name_zh: 结果分组
    description_zh: "可配置展示的分组类型。"
    allowed_values: ["pages", "commands", "records"]
  - id: hotkey
    name_zh: 快捷键
    description_zh: "唤起组合键。"
    allowed_values: ["Ctrl/Cmd+K", "Alt+K", "custom"]

meta:
  related_lingjing_core_classes:
    - "command-palette"
    - "global-search"
