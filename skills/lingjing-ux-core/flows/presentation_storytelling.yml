id: presentation_storytelling
name_zh: 演示叙事任务流
scene: presentation_quarterly_review
summary_zh: >
  描述演示文稿从开场、背景、数据亮点、决策/行动到 Q&A 的通用叙事骨架。

steps:
  - id: opening
    name_zh: 开场与目的
    from_mode: deck_navigation
    description_zh: "明确本次演示的目标与议程。"
  - id: context
    name_zh: 背景与现状
    from_mode: deck_navigation
    description_zh: "回顾上期目标、当前态势，为数据解读提供上下文。"
  - id: highlights
    name_zh: 关键指标亮点
    from_mode: deck_navigation
    description_zh: "呈现核心 KPI，允许放大关键数据。"
  - id: decisions
    name_zh: 决策与行动
    from_mode: deck_navigation
    description_zh: "提出决策或行动项，指明责任人与时间。"
  - id: qna
    name_zh: Q&A 与反馈
    from_mode: audience_engagement
    description_zh: "收集并回答问题，可投票或收集反馈。"
  - id: closing
    name_zh: 总结与 CTA
    from_mode: deck_navigation
    description_zh: "重申关键信息与下一步行动，结束演示。"

notes_zh:
  - "可在 highlights 阶段使用 spotlight/放大交互；在 qna 阶段使用问答面板。"
